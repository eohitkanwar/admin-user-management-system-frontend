services:
  # Static Site
  type: web
  name: admin-user-management-system-frontend
  env: static
  buildCommand: npm run build
  staticPublishPath: build
  
  # Rewrites all routes to index.html for React Router
  routes:
    - type: rewrite
      source: /*
      destination: /index.html
      
  # Add headers for proper routing
  headers:
    - path: /*
      name: X-Frame-Options
      value: DENY
    - path: /*.*
      name: Cache-Control
      value: public, max-age=31536000
